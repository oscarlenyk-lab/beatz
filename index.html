<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Beatz</title>

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#6B5CFF">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="header">

    <div class="brand">

        <img
    src="logos/b.svg"
    alt="Beatz"
    class="brand-logo">

        <h1>Beatz</h1>

    </div>

    <p class="tagline">
        Feel The Beat
    </p>

</div>

<div class="player-section">

    <div class="player-card">

        <img
            id="logoGrande"
            src="logos/m2o.png"
            alt="Radio">

        <div class="player-info">

            <div class="live">

                <span class="live-dot"></span>

                <span id="playStatus">

                    STOPPED

                </span>

                <div class="equalizer">

                    <span></span>
                    <span></span>
                    <span></span>

                </div>

            </div>

            <h2 id="radioNombre">

                Bienvenido a Beatz

            </h2>

            <p id="radioDescripcion">

                Electronic Music Worldwide

            </p>

        </div>

    </div>
    
    <div class="play-control">

    <button id="playToggle">

    <svg
        id="playIcon"
        viewBox="0 0 24 24"
        width="28"
        height="28"
        fill="white">

        <path d="M8 5v14l11-7z"></path>

    </svg>

</button>

    
</div>

<div class="volume-control">

    <input
        type="range"
        id="volumeSlider"
        min="0"
        max="100"
        value="70">

</div>

<audio id="player"></audio>

</div>

    <h2 class="section-title">
    Radio Stations
</h2>

<div id="radios" class="radios-grid"></div>

<h2 class="section-title">
    Music TV
</h2>

<div id="tvs" class="radios-grid"></div>

<video
    id="tvPlayer"
    controls
    playsinline
    style="display:none;">
</video>

<h2 class="section-title">
Featured Shows
</h2>

<div id="shows" class="radios-grid"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {

    window.addEventListener("load", () => {

        navigator.serviceWorker.register("./service-worker.js")
        .then(() => {
            console.log("Service Worker registrado");
        })
        .catch(err => {
            console.error(err);
        });

    });

}
</script>

</body>
</html>
