<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Beatz</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">

    <meta
        name="theme-color"
        content="#6B5CFF">

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="style.css">

</head>

<body class="dark">

<!-- =====================================================
     HEADER
===================================================== -->

<header class="header">

    <div class="brand">

    <img
        src="logos/b.png"
        alt="Beatz"
        class="brand-logo">

    <div class="brand-text">

        <div class="brand-title">

            <h1>Beatz</h1>

            <div class="theme-button">

    <button
        id="themeToggle"
        class="theme-toggle"
        aria-label="Cambiar tema">

        <span id="themeIcon">

<svg
    class="theme-eclipse"
    viewBox="0 0 24 24"
    width="16"
    height="16"
    aria-hidden="true">

    <defs>

        <linearGradient
            id="beatzGradient"
            x1="0%"
            y1="0%"
            x2="100%"
            y2="100%">

            <stop offset="0%" stop-color="#25C8F7"/>

            <stop offset="35%" stop-color="#4B7BFF"/>

            <stop offset="70%" stop-color="#8C52FF"/>

            <stop offset="100%" stop-color="#FF4FA3"/>

        </linearGradient>

    </defs>

    <!-- círculo exterior -->

    <circle

        cx="12"

        cy="12"

        r="8"

        fill="none"

        stroke="url(#beatzGradient)"

        stroke-width="2"

    />

    <!-- eclipse -->

    <path

        d="M12 4
           A8 8 0 0 0 12 20
           A5.5 5.5 0 0 1 12 4Z"

        fill="white"

        opacity=".95"

    />

</svg>

</span>

    </button>

</div>

        </div>

        <p class="tagline">

        
    Connetti la tua mente, senti i bassi.

        </p>

    </div>

</div>

</header>

<!-- =====================================================
     PLAYER PRINCIPAL
===================================================== -->

<section class="player-section">

    <div class="player-card">

        <img
            id="logoGrande"
            src="logos/m2o.png"
            alt="Radio">

        <div class="player-info">

            <div class="live">

                <span class="live-dot"></span>

                <span id="playStatus">

                    STOPPED

                </span>

                <div class="equalizer">

                    <span></span>
                    <span></span>
                    <span></span>

                </div>

            </div>

            <h2 id="radioNombre">

                Bienvenido a Beatz

            </h2>

            <p id="radioDescripcion">

                Electronic Music Worldwide

            </p>

        </div>

    </div>

    <!-- Barra de volumen -->

   <div class="signal-flow">

    <div class="signal-track">

        <div class="signal-pulse"></div>

    </div>

</div>

    <audio id="player"></audio>

</section>

<!-- =====================================================
     RADIO STATIONS
===================================================== -->

<section class="content-section">

    <h2 class="section-title">

        Radio Stations

    </h2>

    <div
        id="radios"
        class="radios-grid">

    </div>

</section>

<!-- =====================================================
     MUSIC TV
===================================================== -->

<section class="content-section">

    <h2 class="section-title">

        Music TV

    </h2>

    <div
        id="tvs"
        class="radios-grid">

    </div>

    <video
        id="tvPlayer"
        controls
        playsinline>

    </video>

</section>

<!-- =====================================================
     FEATURED SHOWS
===================================================== -->

<section class="content-section">

    <h2 class="section-title">

        Featured Shows

    </h2>

    <div
        id="shows"
        class="radios-grid">

    </div>

</section>

<!-- =====================================================
     MINI PLAYER
===================================================== -->

<div
    id="miniPlayer"
    class="mini-player">

    <img
        id="miniLogo"
        class="mini-logo"
        src="logos/m2o.png"
        alt="Radio">

    <div class="mini-info">

        <div
            id="miniNombre"
            class="mini-title">

            Bienvenido a Beatz

        </div>

        <div
            id="miniDescripcion"
            class="mini-subtitle">

            Electronic Music Worldwide

        </div>

    </div>

    <button
        id="miniPlay"
        class="mini-play"
        aria-label="Play / Pause">

        ▶

    </button>

</div>

<!-- =====================================================
     LIBRERÍAS
===================================================== -->

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script src="app.js"></script>

<!-- =====================================================
     SERVICE WORKER
===================================================== -->

<script>

if ("serviceWorker" in navigator) {

    window.addEventListener("load", () => {

        navigator.serviceWorker

            .register("./service-worker.js")

            .then(() => {

                console.log("Service Worker registrado");

            })

            .catch(err => {

                console.error(err);

            });

    });

}

</script>

</body>

</html>
