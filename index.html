<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BeatStream</title>

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#29C7F6">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="header">
    <h1>BeatStream</h1>

    <p class="tagline">
        Electronic Music Worldwide
    </p>
</div>

<div class="player-section">

    <img id="logoGrande"
         src="logos/m2o.png"
         alt="Radio">

    <h2 id="radioNombre">
    Bienvenido a BeatStream
	</h2>

    <div class="live">
        🔵 EN VIVO
    </div>

    <div class="player-controls">

    <button id="playBtn">
        ▶
    </button>

</div>

<audio id="player"></audio>

</div>

<div id="radios" class="radios-grid"></div>

<h2 class="section-title">
    Music TV
</h2>

<div id="tvs" class="radios-grid"></div>

<video
    id="tvPlayer"
    controls
    playsinline
    style="display:none;">
</video>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {

    window.addEventListener("load", () => {

        navigator.serviceWorker.register("./service-worker.js")
        .then(() => {
            console.log("Service Worker registrado");
        })
        .catch(err => {
            console.error(err);
        });

    });

}
</script>

</body>
</html>
